---
name: CI
on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4

      - name: Run yamllint
        uses: daniel-mizsak/workflows/.github/actions/yaml-lint@v0.1.0

      - name: Run ansible-lint
        uses: ansible/ansible-lint@main
        with:
          working_directory: ansible
          setup_python: true
          args: --strict --config-file ../.github/linters/.ansible-lint.yml

      - name: Run molecule
        uses: daniel-mizsak/workflows/.github/actions/molecule@develop
        with:
          working_directory: ansible
