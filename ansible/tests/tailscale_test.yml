---
- name: Get stats of tailscale gpg key
  ansible.builtin.stat:
    path: /etc/apt/keyrings/tailscale.gpg
  register: tailscale_gpg

- name: Assert tailscale gpg exists
  ansible.builtin.assert:
    that:
      - tailscale_gpg.stat.exists

- name: Get stats of tailscale repository
  ansible.builtin.stat:
    path: /etc/apt/sources.list.d/tailscale.sources
  register: tailscale_repository

- name: Assert tailscale repository exists
  ansible.builtin.assert:
    that:
      - tailscale_repository.stat.exists

- name: Assert tailscale is installed
  ansible.builtin.assert:
    that:
      - "'tailscale' in ansible_facts['packages']"

- name: Assert tailscale is running and enabled
  ansible.builtin.assert:
    that:
      - service_facts["ansible_facts"]["services"]["tailscaled.service"]["state"] == "running"
      - service_facts["ansible_facts"]["services"]["tailscaled.service"]["status"] == "enabled"
