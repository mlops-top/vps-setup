---
- name: Assert system user group exists
  ansible.builtin.getent:
    database: group
    key: "{{ user_name }}"

- name: Assert system user exists
  ansible.builtin.getent:
    database: passwd
    key: "{{ user_name }}"

- name: Register primary group of system user
  ansible.builtin.command: >
    id --group --name {{ user_name }}
  register: primary_group
  changed_when: false

- name: Assert primary group of system user is its own group
  ansible.builtin.assert:
    that:
      - primary_group.stdout == user_name

- name: Register sudo status of system user
  ansible.builtin.command: >
    sudo --list --other-user={{ user_name }}
  register: sudo_status
  changed_when: false

- name: Assert system user has sudo privileges
  ansible.builtin.assert:
    that:
      - "'(ALL) NOPASSWD: ALL' in sudo_status.stdout"

- name: Get stats of sudoers system user file
  ansible.builtin.stat:
    path: /etc/sudoers.d/{{ user_name }}
  register: sudoers_system_user_file

- name: Assert sudoers system user file permissions
  ansible.builtin.assert:
    that:
      - sudoers_system_user_file.stat.exists
      - sudoers_system_user_file.stat.mode == "0440"
