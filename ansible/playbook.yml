---
- name: VPS Setup
  hosts: all
  become: true
  gather_facts: true
  vars:
    user_name: ansible
    hashed_password: "{{ lookup('env', 'HASHED_PASSWORD') }}"
    tailscale_auth_key: "{{ lookup('env', 'TAILSCALE_AUTH_KEY') }}"
    public_ssh_key: "{{ lookup('env', 'PUBLIC_SSH_KEY') }}"
    netdata_claim_token: "{{ lookup('env', 'NETDATA_CLAIM_TOKEN') }}"

  handlers:
    - name: Restart sshd
      ansible.builtin.service:
        name: ssh
        state: restarted

    - name: Restart unattended-upgrades
      ansible.builtin.service:
        name: unattended-upgrades
        state: restarted

    - name: Restart netdata
      ansible.builtin.service:
        name: netdata
        state: restarted

  pre_tasks:
    - name: Verify required variables are set
      ansible.builtin.assert:
        that: lookup('vars', item) | trim | length > 0
        fail_msg: "Required variable {{ item }} is not set or is empty"
        quiet: true
      loop:
        - hashed_password
        - tailscale_auth_key
        - public_ssh_key
        - netdata_claim_token
      tags:
        - molecule-notest # Secrets are not available during testing.

    # https://docs.ansible.com/ansible/latest/reference_appendices/faq.html#how-do-i-generate-encrypted-passwords-for-the-user-module
    # Hash by: `mkpasswd --method=sha-512`
    - name: Verify hashed_password is a crypt hash
      ansible.builtin.assert:
        that: hashed_password is match('^\$(6|y)\$')
        fail_msg: "hashed_password must be a crypt hash, not a plaintext password"
        quiet: true

    - name: Update apt package cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install repository management dependencies
      ansible.builtin.apt:
        package:
          - python3-debian
        state: present

  tasks:
    - name: Import user tasks
      ansible.builtin.import_tasks:
        file: tasks/user.yml

    - name: Import tailscale tasks
      ansible.builtin.import_tasks:
        file: tasks/tailscale.yml

    - name: Import ssh tasks
      ansible.builtin.import_tasks:
        file: tasks/ssh.yml

    - name: Import ufw tasks
      ansible.builtin.import_tasks:
        file: tasks/ufw.yml

    - name: Import unattended-upgrades tasks
      ansible.builtin.import_tasks:
        file: tasks/unattended_upgrades.yml

    - name: Import netdata tasks
      ansible.builtin.import_tasks:
        file: tasks/netdata.yml

    - name: Import system packages tasks
      ansible.builtin.import_tasks:
        file: tasks/system_packages.yml
