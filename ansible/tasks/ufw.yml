---
- name: Install ufw
  ansible.builtin.apt:
    package:
      - ufw
    state: present

- name: Deny incoming traffic
  community.general.ufw:
    default: deny
    direction: incoming

- name: Allow outgoing traffic
  community.general.ufw:
    default: allow
    direction: outgoing

- name: Allow specific ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - 80
    - 443

- name: Allow incoming traffic on the tailscale interface
  # Explicitly allow the tailnet so reachability doesn't depend on tailscale's own iptables rules.
  community.general.ufw:
    rule: allow
    direction: in
    interface: tailscale0

- name: Enable ufw
  community.general.ufw:
    state: enabled
